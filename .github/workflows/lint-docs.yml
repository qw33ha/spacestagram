name: Lint Docs
on:
  pull_request:
    branches:
      - main
      - docs-*

jobs:
  latex_indent:
    name: 🧽 Lint LaTeX
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: LaTeX linter (chktex)
      uses: j2kun/chktex-action@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
